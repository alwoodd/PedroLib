plugins {
    id 'com.android.library' version '8.7.0'
    id 'maven-publish'
}

android {
    namespace 'org.lhssa.ftc.teamcode.pedroPathing'
    compileSdk 36

    defaultConfig {
        minSdk 24
    }

    publishing {
        singleVariant("release") {
            withSourcesJar()
        }
    }
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
    implementation 'org.firstinspires.ftc:RobotCore:11.0.0'
    implementation 'org.firstinspires.ftc:RobotServer:11.0.0'
    implementation 'org.firstinspires.ftc:Hardware:11.0.0'
    implementation 'org.firstinspires.ftc:FtcCommon:11.0.0'

    implementation 'com.pedropathing:ftc:2.0.6'
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                artifactId = 'PedroLib'
                groupId = 'com.github.alwoodd' //For JitPack dependency coordinates
                version = '1.0.0'
            }
        }
    }
}